<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Station monitor</title>
  <style>
    body { font-family: ui-monospace, monospace; margin: 2rem; background: #111; color: #eee; }
    h1 { font-size: 1.1rem; }
    table { border-collapse: collapse; width: 100%; max-width: 640px; }
    th, td { text-align: left; padding: 0.4rem 0.8rem; border-bottom: 1px solid #333; }
    .dot { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
    .nominal .dot { background: #3fb950; } .nominal { color: #3fb950; }
    .warning .dot { background: #d29922; } .warning { color: #d29922; }
    .critical .dot { background: #f85149; } .critical { color: #f85149; }
    .stale-value { color: #8b949e; font-style: italic; }
    #live { color: #3fb950; } #live.down { color: #8b949e; }
    #banner { color: #f85149; margin: 0.5rem 0; min-height: 1.2rem; }
  </style>
</head>
<body>
  <h1>Station: <span id="station">…</span> &nbsp; <span id="live">● live</span> <span id="updated"></span></h1>
  <div id="banner"></div>
  <table>
    <thead><tr><th>SIGNAL</th><th>VALUE</th><th>STATUS</th></tr></thead>
    <tbody id="rows"><tr><td>…</td><td>…</td><td>…</td></tr></tbody>
  </table>
  <p>Active alerts: <span id="alerts">…</span></p>

  <script>
    async function poll() {
      const banner = document.getElementById('banner');
      const live = document.getElementById('live');
      try {
        const res = await fetch('/state');
        if (!res.ok) throw new Error('bad status');
        const data = await res.json();
        render(data);
        banner.textContent = '';
        live.classList.remove('down');
        live.textContent = '● live';
        document.getElementById('updated').textContent = '(updated now)';
      } catch (e) {
        // Monitor unreachable — grey the live dot, never present stale values as fresh.
        live.classList.add('down');
        live.textContent = '● offline';
        banner.textContent = 'monitor unreachable — values may be stale';
      }
    }

    function render(data) {
      document.getElementById('station').textContent = data.station;
      document.getElementById('alerts').textContent = data.active_alerts;
      const rows = document.getElementById('rows');
      rows.innerHTML = '';
      for (const s of data.signals) {
        const tr = document.createElement('tr');
        // Stale renders the '— stale' label, never the last-good number.
        const valueCell = s.stale
          ? `<td class="stale-value" data-stale="true">${s.label}</td>`
          : `<td data-stale="false">${s.value} ${s.unit}</td>`;
        // Status carries both a colour class AND the text label — not colour-only.
        const status = `<td class="${s.severity}" data-severity="${s.severity}">`
          + `<span class="dot"></span>${s.label}</td>`;
        tr.innerHTML = `<td>${s.name}</td>${valueCell}${status}`;
        rows.appendChild(tr);
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
