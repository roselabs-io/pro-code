# Pump-station telemetry configuration.
# Thresholds / hysteresis / debounce / TTLs are tuned here — never as literals in the engine.
# `severity` is data here (a string); the engine maps it to the Severity enum at load.

[station]
name = "Pump Station 7"

# Discharge pressure — safety-critical. Overpressure can rupture the line.
[[signal]]
name = "discharge_pressure"
unit = "bar"
safety_critical = true
severity = "critical"
direction = "high"
limit = 10.0
hysteresis = 0.5
debounce = 3
staleness_ttl = 5.0

# Bearing temperature — safety-critical. Overheating precedes bearing failure.
[[signal]]
name = "bearing_temperature"
unit = "degC"
safety_critical = true
severity = "critical"
direction = "high"
limit = 85.0
hysteresis = 3.0
debounce = 3
staleness_ttl = 10.0

# Flow rate — operational, not safety-critical. Low flow signals a dry-run risk.
[[signal]]
name = "flow_rate"
unit = "m3ph"
safety_critical = false
severity = "warning"
direction = "low"
limit = 20.0
hysteresis = 2.0
debounce = 3
staleness_ttl = 15.0
