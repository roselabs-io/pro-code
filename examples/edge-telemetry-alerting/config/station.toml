# Station config — the signal catalog + alert rules. Thresholds live HERE, never in rule code
# (config-driven-thresholds), so re-tuning is a config edit. Values are a build assumption
# (a pump-house station); see docs/assumptions.md — a domain expert confirms them before production.

station = "pump-house-1"

[[signal]]
name = "bearing_temp"
unit = "C"
safety_critical = true
[signal.level]
direction = "high"
warn_at = 80.0
crit_at = 95.0
hysteresis = 3.0
debounce_samples = 2
[signal.staleness]
ttl_seconds = 10.0

[[signal]]
name = "discharge_pressure"
unit = "bar"
safety_critical = true
[signal.level]
direction = "high"
warn_at = 8.5
crit_at = 10.0
hysteresis = 0.3
debounce_samples = 1
[signal.staleness]
ttl_seconds = 10.0

[[signal]]
name = "flow_rate"
unit = "Lpm"
safety_critical = false
[signal.level]
direction = "low"
warn_at = 20.0
hysteresis = 2.0
debounce_samples = 2
[signal.staleness]
ttl_seconds = 30.0
